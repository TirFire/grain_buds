workflows:
  ios-build:
    name: iOS Build (Debug Mode)
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: 获取依赖
        script: flutter pub get
      - name: 编译 iOS (无证书模式)
        script: |
          # 核心：由于没有苹果开发者账号，我们打一个调试包来证明代码没问题
          flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app