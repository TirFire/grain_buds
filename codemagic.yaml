workflows:
  ios-build:
    name: iOS Build (Debug)
    max_build_duration: 30
    instance_type: mac_mini_m1
    working_directory: .
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS
        script: |
          flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app